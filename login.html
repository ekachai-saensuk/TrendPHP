<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <!-- ดึงไฟล์ CSS ส่วนกลางมาใช้งาน -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <h2>กรุณาเข้าสู่ระบบ</h2>
        
        <form action="check.php" method="POST">
            <div class="form-group">
                <label for="user">ชื่อผู้ใช้งาน:</label>
                <input type="text" id="user" name="user" placeholder="กรอกชื่อผู้ใช้งาน" required>
            </div>
            
            <div class="form-group">
                <label for="pass">รหัสผ่าน:</label>
                <input type="password" id="pass" name="pass" placeholder="กรอกรหัสผ่าน" required>
            </div>
            
            <button type="submit">ล็อกอิน</button>
        </form>

        <div class="auth-link">
            ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิกที่นี่</a>
        </div>
    </div>

</body>
</html>
