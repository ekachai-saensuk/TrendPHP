<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก</title>
    <!-- ดึงไฟล์ CSS ส่วนกลางมาใช้งาน -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <h2>สมัครสมาชิกใหม่</h2>
        
        <form action="save_register.php" method="POST">
            <div class="form-group">
                <label for="user">ชื่อผู้ใช้งาน (Username):</label>
                <input type="text" id="user" name="user" placeholder="ตั้งชื่อผู้ใช้งานของคุณ" required>
            </div>
            
            <div class="form-group">
                <label for="email">อีเมล (Email):</label>
                <input type="email" id="email" name="email" placeholder="example@domain.com" required>
            </div>
            
            <div class="form-group">
                <label for="pass">รหัสผ่าน (Password):</label>
                <input type="password" id="pass" name="pass" placeholder="ตั้งรหัสผ่านที่ปลอดภัย" required>
            </div>
            
            <button type="submit">ยืนยันการสมัคร</button>
        </form>

        <div class="auth-link">
            มีบัญชีอยู่แล้ว? <a href="login.html">ไปหน้าเข้าสู่ระบบ</a>
        </div>
    </div>

</body>
</html>
